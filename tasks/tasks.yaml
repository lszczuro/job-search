- task_id: cron-refresh-recovery
  goal: Restore automatic article refresh when a previous worker run leaves an orphaned running refresh job that blocks new cron-triggered jobs.
  depends_on: []
  stack: typescript
  owner_role: implementer
  target_paths:
    - src/db/repositories/import-jobs-repository.ts
    - tests/db/import-jobs-repository.test.ts
  definition_of_done: Cron-triggered refresh can enqueue a new job again after an orphaned running refresh exceeds the timeout window, and the regression is covered by automated tests.
  status: completed
